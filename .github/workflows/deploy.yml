name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel none, just queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage only the runtime assets — leave out tests, node_modules, dev configs.
      - name: Stage site
        run: |
          mkdir _site
          cp index.html manifest.json sw.js _site/
          cp -r icons _site/
          cp -r content _site/
          # Custom domain — baked into every deploy so GitHub Pages doesn't
          # drop it on the next run (Actions deploys can unset it otherwise).
          echo 'watchman.usmcmin.org' > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
